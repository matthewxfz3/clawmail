# Stalwart Mail Server — Clawmail configuration
#
# Required environment variables:
#   DOMAIN               — the mail hostname, e.g. mail.clawmail.ai
#   DB_HOST              — Cloud SQL (PostgreSQL) host/IP
#   DB_PASSWORD          — PostgreSQL password for the stalwart user
#   GCS_BUCKET           — GCS bucket name (accessed via S3-compatible API)
#   GCS_ACCESS_KEY       — HMAC access key for GCS S3-compatible API
#   GCS_SECRET_KEY       — HMAC secret key for GCS S3-compatible API
#   SENDGRID_API_KEY     — Twilio SendGrid API key (SMTP password; username is always literal "apikey")
#   STALWART_ADMIN_SECRET — Password for the built-in admin account

# ---------------------------------------------------------------------------
# Server identity
# ---------------------------------------------------------------------------
[server]
hostname = "%{env:DOMAIN}%"

# ---------------------------------------------------------------------------
# Listeners
# ---------------------------------------------------------------------------
[[server.listener]]
id = "smtp"
bind = ["0.0.0.0:25"]
protocol = "smtp"

[[server.listener]]
id = "submission"
bind = ["0.0.0.0:587"]
protocol = "smtp"
tls.implicit = false

[[server.listener]]
id = "imap"
bind = ["0.0.0.0:143"]
protocol = "imap"

[[server.listener]]
id = "jmap"
bind = ["0.0.0.0:8080"]
protocol = "http"

# ---------------------------------------------------------------------------
# Storage backends
# ---------------------------------------------------------------------------

# PostgreSQL — primary data store (Cloud SQL in production)
[store."postgresql"]
type = "postgresql"
host = "%{env:DB_HOST}%"
port = 5432
database = "stalwart"
user = "stalwart"
password = "%{env:DB_PASSWORD}%"

# GCS via S3-compatible API — blob / message body store
[store."gcs"]
type = "s3"
bucket = "%{env:GCS_BUCKET}%"
endpoint = "https://storage.googleapis.com"
region = "auto"
access-key = "%{env:GCS_ACCESS_KEY}%"
secret-key = "%{env:GCS_SECRET_KEY}%"

# ---------------------------------------------------------------------------
# Internal directory — virtual user management backed by PostgreSQL
# ---------------------------------------------------------------------------
[directory."internal"]
type  = "internal"
store = "postgresql"

# ---------------------------------------------------------------------------
# Assign storage backends to roles
# ---------------------------------------------------------------------------
[storage]
data      = "postgresql"
fts       = "postgresql"
blob      = "gcs"
lookup    = "postgresql"
directory = "internal"

# ---------------------------------------------------------------------------
# Outbound relay — Twilio SendGrid (GCP blocks direct port-25 egress)
# SMTP username is always the literal string "apikey".
# SMTP password is your SendGrid API key.
# ---------------------------------------------------------------------------
[remote."sendgrid"]
address = "smtp.sendgrid.net"
port = 587
tls.implicit = false
auth.username = "apikey"
auth.secret   = "%{env:SENDGRID_API_KEY}%"

# ---------------------------------------------------------------------------
# Admin account
# The built-in admin password is read from the environment so it is never
# stored in plain text in this file.
# ---------------------------------------------------------------------------
[authentication.fallback-admin]
user   = "admin"
secret = "%{env:STALWART_ADMIN_SECRET}%"

# ---------------------------------------------------------------------------
# Queue routing — deliver local mail locally, relay everything else via SendGrid
# ---------------------------------------------------------------------------

# For each queued message, pick the next hop based on recipient domain.
# is_local_domain checks Stalwart's internal directory for the domain.
[queue.outbound]
next-hop = [{if = "is_local_domain('', rcpt.domain)", then = "'local'"}, {else = "'sendgrid'"}]

[queue.route."local"]
type = "local"

[queue.route."sendgrid"]
type     = "relay"
server   = "sendgrid"
# v0.15 requires these fields inline even when referencing a remote.*
address  = "smtp.sendgrid.net"
port     = 587
protocol = "Smtp"

# ---------------------------------------------------------------------------
# DKIM signing — sign outbound mail with Ed25519
# The private key is stored in the database (provisioned via /api/dkim).
# DNS: default._domainkey.${DOMAIN} TXT "v=DKIM1; k=ed25519; p=<pubkey>"
# ---------------------------------------------------------------------------

[auth.dkim.sign]
if   = "is_local_domain('', sender_domain)"
then = "['default']"
